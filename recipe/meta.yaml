{% set version = "2.4.4" %}

package:
  name: fusesoc
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/fusesoc/fusesoc-{{ version }}.tar.gz
  sha256: 484dbc44ce002b6901439f0087e79637e5594e05fce7a2000298028193522e03

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - fusesoc = fusesoc.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - edalize >=0.4.1
    - pyparsing
    - pyyaml
    - simplesat >=0.8.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - fusesoc

about:
  home: https://github.com/olofk/fusesoc/
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: FuseSoC is a package manager and a set of build tools for FPGA/ASIC development

extra:
  recipe-maintainers:
    - hmaarrfk
