{% set version = "2.4.6" %}

package:
  name: fusesoc
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/f/fusesoc/fusesoc-{{ version }}.tar.gz
  sha256: 774e0316d57bd4292bbd7e75c75f5c9742929f6c8e08c99858646fdc0103f17c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - fusesoc = fusesoc.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools_scm
  run:
    - python >={{ python_min }}
    - edalize >=0.4.1
    - pyparsing
    - pyyaml
    - simplesat >=0.8.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - fusesoc

about:
  home: https://github.com/olofk/fusesoc/
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: FuseSoC is a package manager and a set of build tools for FPGA/ASIC development

extra:
  recipe-maintainers:
    - hmaarrfk
